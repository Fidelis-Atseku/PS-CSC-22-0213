<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aframe Scene</title>
    <link rel="stylesheet" href="practice.css"/>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
    <a-scene shadow="type: pcfsoft" position="0 0.8 -3.5">
        <a-assets>
            <img id="woodTex" src="assets/wood_0015_1k_66DfC8/wood_0015_color_1k.jpg">
            <img id="gravel" src="assets\ground_0036_1k_HTy69j\ground_0036_color_1k.jpg">
            <img id="leaves" src="assets\tiles_0107_1k_t9i7qK\tiles_0107_color_1k.jpg">
            <img id="metal" src="assets\metal_0081_1k_qh6kbG\metal_0081_color_1k.jpg">
            <img id="tarp" src="assets\plastic_0019_1k_OnG8Z6\plastic_0019_color_1k.jpg">
            <img id="grass" src="assets\ground_0037_1k_P8QzpB\ground_0037_color_1k.jpg">
            <img id="bark" src="assets\wood_0047_1k_Y5VNTr\wood_0047_color_1k.jpg">
            <img id="milk" src="assets\milk2.jpg">
            <img id="milo" src="assets\milo1.jpg">
        </a-assets>
        
        <!-- Table -->
        <a-box width="1" height="0.1" depth="3"  rotation="0 0 0" src="#woodTex" shadow="cast: true; receive: true">
            <a-box position="-0.45 -0.7 1.45" width="0.1" height="1.4" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="0.45 -0.7 1.45" width="0.1" height="1.4" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="-0.45 -0.7 -1.45" width="0.1" height="1.4" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="0.45 -0.7 -1.45" width="0.1" height="1.4" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
        </a-box>

        <!-- Right seat -->
        <a-box position="1.5 -0.4 0" width="1" height="0.1" depth="1.5" src="#woodTex" shadow="cast: true; receive: true">
            <!-- legs -->
            <a-box position="-0.45 -0.5 0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="0.45 -0.5 0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="-0.45 -0.5 -0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="0.45 -0.5 -0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <!-- Backrest -->
            <a-box position="0.45 0.5 0" width="0.1" height="1" depth="1.5" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        </a-box>

        <!-- left seat -->
        <a-box position="-1.5 -0.4 0" width="1" height="0.1" depth="1.5" src="#woodTex" shadow="cast: true; receive: true">
            <!-- legs -->
            <a-box position="-0.45 -0.5 0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="0.45 -0.5 0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="-0.45 -0.5 -0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <a-box position="0.45 -0.5 -0.7" width="0.1" height="1" depth="0.1" src="#metal" shadow="cast: true; receive: true"></a-box>
            <!-- Backrest -->
            <a-box position="-0.45 0.5 0" width="0.1" height="1" depth="1.5" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        </a-box>

        <!-- Table top -->
        <!-- Milk tin -->
        <a-cylinder position="0.2 0.15 0.4" radius="0.1" height="0.2" shadow="cast: true; receive: true" src="#milk"></a-cylinder>

        <!-- Milo tin -->
        <a-cylinder position="-0.25 0.15 0.33" radius="0.1" height="0.2" shadow="cast: true; receive: true" src="#milo">
        </a-cylinder>

        <!-- Cup-->
        <a-cylinder position="0 0.15 0" radius="0.1" height="0.2" shadow="cast: true; receive: true" src="#metal">
            <a-cylinder position="0 0.1 0" radius="0.1" height="0.2" dcolor="#ffffff" material="opacity: 0; transparent: true" shadow="cast: true; receive: true"></a-cylinder>
        </a-cylinder>

        <!-- Cup -->
        <a-cylinder position="-0.3 0.15 0"  radius="0.1" height="0.2" shadow="cast: true; receive: true" src="#metal"></a-cylinder>
        
        <!-- Floor -->
        <a-plane position="0 -1.4 0" rotation="-90 0 0" width="35" height="35" src="#grass" repeat="15 15" shadow="cast: true; receive: true"></a-plane>

        <!-- Sky -->
        <a-sky color="#87CEEB" shadow="cast: true; receive: true"></a-sky>

        <!-- Fence -->
        <a-box position="0 -0.3 -14.75" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2" shadow="cast: true; receive: true"></a-box>
        <a-box position="0 1 -14.75" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2" shadow="cast: true; receive: true"></a-box>

        <a-box position="0 -0.3 14.75" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2" shadow="cast: true; receive: true"></a-box>
        <a-box position="0 1 14.75" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2" shadow="cast: true; receive: true"></a-box>

        <a-box position="15 -0.3 0" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2" rotation="0 90 0" shadow="cast: true; receive: true"></a-box>
        <a-box position="15 1 0" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2"  rotation="0 90 0" shadow="cast: true; receive: true"></a-box>

        <a-box position="-15 -0.3 0" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2" rotation="0 90 0" shadow="cast: true; receive: true"></a-box>
        <a-box position="-15 1 0" width="30" height="0.5" depth="0.5" src="#woodTex" repeat="40 2"  rotation="0 90 0" shadow="cast: true; receive: true"></a-box>

        <!-- Fence pole -->
        <a-box position="-15 0 -14.75" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        <a-box position="0 0 -14.75" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        <a-box position="15 0 -14.75" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        <a-box position="-15 0 0" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        <a-box position="-15 0 14.75" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>

        <a-box position="-2 0 14.75" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        <a-box position="2 0 14.75" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>

        <a-box position="15 0 14.75" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>
        <a-box position="15 0 0" width="0.5" depth="0.5" height="3" src="#woodTex" shadow="cast: true; receive: true"></a-box>

        <!-- Shrubs -->
        <a-cylinder position="-9 -0.4 -9" radius="0.5" height="2" src="#bark" repeat="2 1" shadow="cast: true; receive: true">
            <a-sphere position="0 1.5 0" radius="1.5" src="#leaves" shadow="cast: true; receive: true"></a-sphere>
        </a-cylinder>

        <a-cylinder position="-9 -0.4 9" radius="0.5" height="2" src="#bark" repeat="2 1" shadow="cast: true; receive: true">
            <a-sphere position="0 1.5 0" radius="1.5" src="#leaves" shadow="cast: true; receive: true"></a-sphere>
        </a-cylinder>

        <a-cylinder position="9 -0.4 -9" radius="0.5" height="2" src="#bark" repeat="2 1" shadow="cast: true; receive: true">
            <a-sphere position="0 1.5 0" radius="1.5" src="#leaves" shadow="cast: true; receive: true"></a-sphere>
        </a-cylinder>

        <a-cylinder position="9 -0.4 9" radius="0.5" height="2" src="#bark" repeat="2 1" shadow="cast: true; receive: true">
            <a-sphere position="0 1.5 0" radius="1.5" src="#leaves" shadow="cast: true; receive: true"></a-sphere>
        </a-cylinder>

        <!-- Gazebo -->
        <!-- legs -->
        <a-cylinder position="0 0.6 -4" radius="0.1" height="4" src="#metal" repeat="2 5" shadow="cast: true; receive: true"></a-cylinder>
        <a-cylinder position="-4 0.6 0" radius="0.1" height="4" src="#metal" repeat="2 5" shadow="cast: true; receive: true"></a-cylinder>
        <a-cylinder position="4 0.6 0" radius="0.1" height="4" src="#metal" repeat="2 5" shadow="cast: true; receive: true"></a-cylinder>
        <a-cylinder position="0 0.6 4" radius="0.1" height="4" src="#metal" repeat="2 5" shadow="cast: true; receive: true"></a-cylinder>

        <!-- Canopy -->
        <a-entity geometry="primitive: cone; radiusBottom: 6; radiusTop: 0; height: 1.3" position="0 3.1 0" material="src: #tarp; repeat: 5 5" shadow="cast: true; receive: true"></a-entity>
        
        <!-- Camera -->
        <a-box position="4 0 8" rotation="0 25 0" width="0" depth="0" shadow="cast: true; receive: true">
            <a-camera look-controls="wasd-controls" wasd-controls="fly: true"></a-camera>
        </a-box>

        <!-- lighting -->
        <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>
        <a-light light="type: directional; castShadow:true; mapSize: 2048 2048;" position="1 1 1"></a-light>

    </a-scene>
</body>

</html>
